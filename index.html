<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나라장터 스마트 검색</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {h
  --bg:#eef2f7; --surface:#f8fafc; --border:#cbd5e1;h
  --tp:#1a1d23; --ts:#5a6070; --th:#9aa0ad;h
  --blue:#2563eb; --blue-l:#eff4ff; --blue-m:#93b8f8;
  --green:#16a34a; --green-l:#f0fdf4;
  --amber:#d97706; --amber-l:#fffbeb;h
  --red:#dc2626; --red-l:#fef2f2;hh
  --gray:#f1f3f6; --purple:#7c3aed; --purple-l:#f5f3ff;hh
  --r-sm:6px; --r-md:10px; --r-lg:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard','Apple SD Gothic Neo',-apple-system,sans-serif;background:var(--bg);color:var(--tp);font-size:14px;line-height:1.6;}


.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;}
.hdr-l{display:flex;align-items:center;gap:10px;}
.logo{width:28px;height:28px;background:var(--blue);border-radius:7px;display:flex;align-items:center;justify-content:center;}
.logo svg{width:16px;height:16px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;}
.hdr-r{display:flex;align-items:center;gap:8px;}
.api-pill{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--ts);background:var(--gray);padding:4px 10px;border-radius:20px;}
.api-dot{width:6px;height:6px;border-radius:50%;background:var(--amber);}


.wrap{max-width:1200px;margin:0 auto;padding:20px 24px;}


/* 광고 */
.ad-top{background:linear-gradient(135deg,#f8faff,#eef2ff);border:1px solid #c7d7fe;border-radius:var(--r-md);padding:9px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;}
.ad-lbl{font-size:10px;color:#818cf8;font-weight:700;letter-spacing:0.5px;white-space:nowrap;}
.ad-txt{flex:1;text-align:center;font-size:12px;color:#4338ca;}
.ad-x{font-size:16px;color:var(--th);cursor:pointer;padding:2px 5px;}


/* 이메일 */
.email-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 20px;margin-bottom:14px;}
.panel-ttl{font-size:11px;font-weight:700;color:var(--th);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;}
.email-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.email-inp{flex:1;min-width:180px;padding:7px 12px;border:1px solid var(--border);border-radius:var(--r-sm);font-size:13px;outline:none;}
.email-inp:focus{border-color:var(--blue-m);}
.email-desc{font-size:11px;color:var(--th);margin-top:6px;}


/* 검색유형 탭 */
.stype-bar{display:flex;gap:0;margin-bottom:14px;border-radius:var(--r-md);overflow:hidden;border:2px solid #2563eb;width:fit-content;}
.stype-btn{padding:8px 24px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:#dbeafe;color:#1e40af;transition:all 0.15s;border-right:1px solid #93c5fd;}
.stype-btn:last-child{border-right:none;}
.stype-btn.active{background:#2563eb;color:#fff;box-shadow:inset 0 -2px 0 rgba(0,0,0,0.15);}
.stype-btn:hover:not(.active){background:#bfdbfe;color:#1e3a8a;}


/* 검색 패널 */
.sp{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 22px;margin-bottom:14px;}
.sp-ttl{font-size:11px;font-weight:700;color:var(--th);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:14px;}
.row-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.row-lbl{font-size:12px;font-weight:600;color:var(--ts);}


.kw-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px;}
.kw-wrap{display:flex;align-items:center;}
.kw-chip{padding:5px 11px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);font-size:13px;color:var(--ts);cursor:pointer;transition:all 0.15s;user-select:none;display:flex;align-items:center;gap:5px;}
.kw-chip:hover{border-color:var(--blue-m);color:var(--blue);background:var(--blue-l);}
.kw-chip.active{border-color:var(--blue);background:var(--blue-l);color:var(--blue);font-weight:600;}
.kw-del{font-size:11px;color:var(--th);cursor:pointer;margin-left:3px;padding:1px 3px;border-radius:3px;line-height:1;}
.kw-del:hover{color:var(--red);background:var(--red-l);}
.btn-add{padding:5px 11px;border-radius:20px;border:1.5px dashed var(--border);background:none;font-size:12px;color:var(--th);cursor:pointer;}
.btn-add:hover{border-color:var(--blue-m);color:var(--blue);}


.divider{height:1px;background:var(--border);margin:13px 0;}
.filter-row{display:flex;flex-wrap:wrap;align-items:center;gap:7px;}
